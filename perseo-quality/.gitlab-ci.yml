stages:
  - analysis
  - test
  - build
  - deploy

workflow:
  rules:
    - when: always

variables:
  GIT_DEPTH: 1

.tags_manylinux_2_28:
  tags: ["eotools_manylinux228"]

.tags_win10_new:
  tags: ["eotools_win10"]

default:
  before_script:
    - cd $SUBPROJECT

# === test - integration =====================================================
# ============================================================================
integration_test_linux:
  stage: test
  script:
    - python${PYTHON} -m venv ./ci_test
    - source ./ci_test/bin/activate
    - python -m pip install .[graphs]
    - pip install sct[cli,graphs]
    - python -m pip install sct_aresys_reader sct_sentinel1_reader
    - sct testing test -r ./tests/integration_tests/test_registry_linux.json -out ./test_output
  parallel:
    matrix:
      - PYTHON: ["3.11", "3.12", "3.13", "3.14"]
  extends: .tags_manylinux_2_28
  needs: []

integration_test_windows:
  stage: test
  script:
    - . "C:\Users\ContainerAdministrator\Documents\WindowsPowerShell\profile.ps1"
    - conda create -y -n integration_test python=${PYTHON}
    - conda activate integration_test
    - python -m pip install -e .[graphs]
    - pip install sct[cli,graphs]
    - python -m pip install sct_aresys_reader sct_sentinel1_reader
    - sct testing test -r ./tests/integration_tests/test_registry_windows.json -out ./test_output
  parallel:
    matrix:
      - PYTHON: ["3.11", "3.12", "3.13"]
  extends: .tags_win10_new
  needs: []
