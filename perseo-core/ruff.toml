line-length = 120
output-format = "concise"
target-version = "py311"

[format]
docstring-code-format = true

[lint]
select = ["ALL"]
ignore = [
    "D203",    # incorrect-blank-line-before-class
    "D213",    # multi-line-summary-second-line
    "COM812",  # missing-trailing-comma
    "S101",    # assert
    "DTZ001",  # call-datetime-without-tzinfo
    "DTZ005",  # call-datetime-now-without-tzinfo
    "PGH003",  # Use specific rule codes when ignoring type issues
    "PLR2004", # Magic value used in comparison
]

pylint.max-args = 9      # default is 5, it should be reduced after refactoring
pylint.max-returns = 7   # default is 6, it should be reduced after refactoring
pylint.max-branches = 13 # default is 12, it should be reduced after refactoring

flake8-import-conventions.banned-from = [
    "perseo_core.timing",
    "perseo_core.geometry",
    "perseo_core.geometry.pointing",
    "perseo_core.geometry.geocoding",
    "perseo_core.geometry.navigation",
]

[lint.per-file-ignores]
"**/tests/**" = [
    "D",      # pydocstyle
    "SLF001", # private-member-access
    "N806",   # non-lowercase-variable-in-function
    "ICN003", # banned-import-from
]
"**/noxfile.py" = [
    "D", # pydocstyle
]
"__init__.py" = [
    "F403", # undefined-local-with-import-star
]
