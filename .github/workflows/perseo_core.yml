name: perseo-core

on:
  workflow_dispatch:

  push:
    tags:
      - "perseo-core-v*"
    paths:
      - ".github/workflows/perseo-core.yml"
      - "perseo-core/**"

jobs:
  analysis:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    strategy:
      fail-fast: false
      matrix:
        task:
          - check_format
          - pylint

    defaults:
      run:
        working-directory: perseo-core

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s ${{ matrix.task }}

  mypy:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    defaults:
      run:
        working-directory: perseo-core

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install -e .[type]
      - run: python -m mypy ./src/perseo_core

  pyrefly:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    defaults:
      run:
        working-directory: perseo-core

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install -e . pyrefly
      - run: |
          python -m pyrefly check \
            --python-interpreter-path $(python -c "import sys; print(sys.executable)")

  unittest_linux:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    defaults:
      run:
        working-directory: perseo-core

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Select Python ${{ matrix.python }}
        run: |
          case "${{ matrix.python }}" in
            3.11) echo "/opt/python/cp311-cp311/bin" >> $GITHUB_PATH ;;
            3.12) echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH ;;
            3.13) echo "/opt/python/cp313-cp313/bin" >> $GITHUB_PATH ;;
            3.14) echo "/opt/python/cp314-cp314/bin" >> $GITHUB_PATH ;;
          esac

      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s pytest -p ${{ matrix.python }}
      - name: Upload junit and coverage
        uses: actions/upload-artifact@v5
        with:
          name: linux-test-${{ matrix.python }}
          path: |
            perseo-core/_build/pytest-report-*.xml
            perseo-core/_build/pytest-coverage-*.xml
          retention-days: 14

  sdist:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    defaults:
      run:
        working-directory: perseo-core

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s build_sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: perseo-core/dist/*.tar.gz
          retention-days: 14

  wheel:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    defaults:
      run:
        working-directory: perseo-core

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s build_wheel

      - uses: actions/upload-artifact@v5
        with:
          name: wheel
          path: perseo-core/dist/*.whl
          retention-days: 14
