name: Publish

on:
  push:
    tags:
      - "perseo-core-v*"
      - "perseo-quality-v*"
      - "perseo-perturbations-v*"
      - "docs-v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-perseo-core:
    if: startsWith(github.ref_name, 'perseo-core-v')
    runs-on: ubuntu-latest

    environment: pypi-perseo-core

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install build

      - name: Build package
        working-directory: perseo-core
        run: |
          python -m build
          ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: perseo-core/dist

  publish-perseo-quality:
    if: startsWith(github.ref_name, 'perseo-quality-v')
    runs-on: ubuntu-latest

    environment: pypi-perseo-quality

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install build

      - name: Build package
        working-directory: perseo-quality
        run: |
          python -m build
          ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: perseo-quality/dist

  deploy-docs:
    if: startsWith(github.ref_name, 'docs-v')
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zensical
        run: pip install zensical mkdocstrings-python

      - name: Build docs
        run: |
          zensical build
          ls -la site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
